        var h = location.hostname;
        if (h === 'demircansilaj.web.app' || h === 'demircansilaj.firebaseapp.com' || h === 'demircansilaj.com.tr') {
          location.replace('https://www.demircansilaj.com.tr' + location.pathname + location.search + location.hash);
        }
      })();
    </script>

    <!-- Yapılandırılmış Veri: Sıkça Sorulan Sorular (AI/GEO için) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Vakumlu mısır silajının raf ömrü ne kadardır?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Özel vakumlama ve presleme teknolojisi sayesinde, balyaların dış ambalajı zarar görmediği sürece besin değerini kaybetmeden 24 ay boyunca taze kalır."
          }
        },
        {
          "@type": "Question",
          "name": "Minimum sipariş miktarı ne kadardır?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Lojistik maliyetlerini en aza indirmek adına minimum sipariş miktarı 10 ton (kamyon bazlı) veya 25 tondur (tır bazlı). Daha küçük miktarlar için iletişime geçebilirsiniz."
          }
        },
        {
          "@type": "Question",
          "name": "Kuru madde oranı nasıl kontrol edilir?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hasat sırasında tarlada anlık nem ölçerlerle kontrol yapılır; hasat sonrasında her partiden numune alınarak akredite laboratuvarlarda kuru madde ve besin değeri analizleri gerçekleştirilir. Hedef kuru madde oranı %30-35'tir."
          }
        },
        {
          "@type": "Question",
          "name": "Lojistik ve nakliye süreci nasıl işliyor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Adana merkezli fabrikadan Türkiye'nin her iline anlaşmalı tır ve kamyon filosuyla kapıya teslimat sağlanır. Nakliye ücreti sipariş tonajına ve teslimat yerine göre hesaplanarak teklife eklenir."
          }
        }
      ]
    }
    </script>
